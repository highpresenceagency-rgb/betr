app = "bettrr-ml-worker"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"     # keep running so the background poller works
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"                  # mediapipe/opencv need headroom; bump if OCR OOMs
